name: scarabgolden
description: "Scarab Golden - Egyptian sliding puzzle game."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  webview_flutter: ^4.10.0
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/icon.jpg"
  min_sdk_android: 21
  adaptive_icon_background: "#0B1A3A"
  adaptive_icon_foreground: "assets/icon.jpg"
  adaptive_icon_foreground_inset: 0
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/Notifications/
    - assets/nowifi/
