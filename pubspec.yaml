name: scarabgolden
description: "Scarab Golden - Egyptian sliding puzzle game."
publish_to: 'none'
version: 1.0.1+3

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── Local puzzle (arena) storage ─────────────────────────────
  shared_preferences: ^2.5.3

  # ── Portal (network / attribution) stack ─────────────────────
  # Versions chosen to differ from other titles in the roster so the
  # per-project binary fingerprint stays distinct on the store.
  appsflyer_sdk: ^6.15.3
  firebase_core: ^3.14.0
  firebase_messaging: ^15.2.5
  firebase_app_check: ^0.3.2+10
  flutter_local_notifications: ^18.0.1
  connectivity_plus: ^6.1.5
  http: ^1.3.0
  device_info_plus: ^11.4.0
  package_info_plus: ^8.3.0
  flutter_secure_storage: ^10.0.0
  url_launcher: ^6.3.2
  webview_flutter: ^4.13.1
  webview_flutter_android: ^4.11.0
  video_player: ^2.9.5
  # NOTE: DO NOT upgrade file_picker to 10.x — its Kotlin-only KGP
  # collides with Flutter's built-in Kotlin support and breaks the
  # generated plugin registrant.
  file_picker: 8.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

# ┌───────────────────────────────────────────────────────────────┐
# │ flutter_launcher_icons is intentionally NOT re-runnable here.  │
# │                                                                │
# │ The adaptive-icon XML in                                       │
# │   android/app/src/main/res/mipmap-anydpi-v26/launcher_icon.xml │
# │   android/app/src/main/res/drawable-anydpi-v26/                │
# │                                    ic_splash_logo.xml          │
# │ has been hand-tuned so the pharaoh art (sg_pharaoh_art.png)    │
# │ survives every OEM launcher mask AND matches the Android 12+   │
# │ splash icon 1:1.  The FLI generator would overwrite those XML  │
# │ files with a 0% inset edge-to-edge foreground, which then      │
# │ gets clipped by the Pixel-circle mask.                         │
# │                                                                │
# │ If you MUST regenerate the density PNGs (e.g. changed the      │
# │ source art):                                                   │
# │   1. Uncomment the flutter_launcher_icons block below.         │
# │   2. `dart run flutter_launcher_icons`.                        │
# │   3. Rename drawable-*/ic_launcher_foreground.png              │
# │      → drawable-*/sg_pharaoh_art.png.                          │
# │   4. Re-apply the hand-written mipmap / drawable XML files.    │
# └───────────────────────────────────────────────────────────────┘
# flutter_launcher_icons:
#   android: "launcher_icon"
#   ios: false
#   image_path: "assets/icon.jpg"
#   min_sdk_android: 21
#   adaptive_icon_background: "#100009"
#   adaptive_icon_foreground: "assets/icon.jpg"
#   remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/Notifications/
    - assets/nowifi/
